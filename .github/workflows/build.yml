name: Build My Tweak
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. 下载我的代码
        uses: actions/checkout@v4

      - name: 2. 强力安装环境 (绕过 API 限制)
        run: |
          brew install ldid
          # 直接克隆 Theos 核心文件，不使用会报错的官方脚本
          git clone --recursive https://github.com/theos/theos.git ~/theos
          # 手动下载并配置 SDK
          curl -LO https://github.com/theos/sdks/releases/latest/download/iPhoneOS14.5.sdk.tar.xz
          tar -xf iPhoneOS14.5.sdk.tar.xz
          mv iPhoneOS14.5.sdk ~/theos/sdks/
          rm iPhoneOS14.5.sdk.tar.xz

      - name: 3. 开始编译插件
        run: |
          export THEOS=~/theos
          make

      - name: 4. 提取生成的 dylib 插件
        uses: actions/upload-artifact@v4
        with:
          name: MyTweak-Dylib
          path: .theos/obj/debug/*.dylib
